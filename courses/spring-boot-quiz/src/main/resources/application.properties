spring.application.name=java-quiz
spring.datasource.url=${QUIZ_DB_URL:jdbc:mysql://localhost:3306/java_quiz}
spring.datasource.username=${QUIZ_DB_USERNAME:quiz_app}
spring.datasource.password=${QUIZ_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
server.error.include-message=never
